name: elderlink
description: Connecting isolated elders with caring volunteers in the community.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & styling
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # State management
  provider: ^6.1.1

  # Location & maps
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.3
  geocoding: ^2.1.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.2.2
  shared_preferences: ^2.2.2
  image_picker: ^1.0.6
  permission_handler: ^11.1.0
  url_launcher: ^6.2.2
  cached_network_image: ^3.3.0

  # Charts (for family dashboard)
  fl_chart: ^0.66.2

  # Voice input
  speech_to_text: ^7.3.0

  
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  generate: true
  uses-material-design: true

  # Add Poppins font (download from Google Fonts or use google_fonts package)
